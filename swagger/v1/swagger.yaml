---
openapi: 3.0.1
info:
  title: DC-BE Web Crawling API
  version: 1.0.0
  description: API for managing web crawling jobs and data collection
paths:
  "/api/v1/auth/login":
    post:
      summary: Login
      tags:
      - Authentication
      description: Authenticate user and get JWT token
      parameters: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      email:
                        type: string
                        example: admin@dcbe.com
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                required:
                - token
                - user
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid credentials
        '422':
          description: unprocessable entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        items:
                          type: string
                      password:
                        type: array
                        items:
                          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: admin@dcbe.com
                password:
                  type: string
                  example: password123
              required:
              - email
              - password
  "/api/v1/auth/register":
    post:
      summary: Register
      tags:
      - Authentication
      description: Register new user account
      parameters: []
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '422':
          description: unprocessable entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: newuser@dcbe.com
                password:
                  type: string
                  minLength: 6
                  example: password123
                password_confirmation:
                  type: string
                  example: password123
              required:
              - email
              - password
              - password_confirmation
  "/api/v1/auth/profile":
    get:
      summary: Get user profile
      tags:
      - Authentication
      description: Get current user profile information
      security:
      - bearerAuth: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      email:
                        type: string
                        example: admin@dcbe.com
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Token missing
  "/api/v1/auth/logout":
    delete:
      summary: Logout
      tags:
      - Authentication
      description: Logout user and invalidate token
      security:
      - bearerAuth: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/crawling_jobs":
    get:
      summary: List crawling jobs
      tags:
      - Crawling Jobs
      description: Get list of all crawling jobs
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
      - name: status
        in: query
        required: false
        enum:
        - pending
        - running
        - paused
        - completed
        - failed
        description: "Filter by status:\n * `pending` \n * `running` \n * `paused`
          \n * `completed` \n * `failed` \n "
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  crawling_jobs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: News Crawl Job
                        url:
                          type: string
                          example: https://example.com
                        status:
                          type: string
                          enum:
                          - pending
                          - running
                          - paused
                          - completed
                          - failed
                        schedule:
                          type: string
                          example: 0 */6 * * *
                        last_run_at:
                          type: string
                          format: date-time
                          nullable: true
                        next_run_at:
                          type: string
                          format: date-time
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  pagination:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                      per_page:
                        type: integer
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      summary: Create crawling job
      tags:
      - Crawling Jobs
      description: Create a new crawling job
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  crawling_job:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      url:
                        type: string
                      status:
                        type: string
                      schedule:
                        type: string
                      selector:
                        type: string
                      description:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '422':
          description: unprocessable entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Daily News Crawl
                url:
                  type: string
                  format: uri
                  example: https://news.example.com
                schedule:
                  type: string
                  example: 0 9 * * *
                  description: Cron expression
                selector:
                  type: string
                  example: ".article"
                  description: CSS selector for content
                description:
                  type: string
                  example: Crawl daily news articles
              required:
              - name
              - url
  "/api/v1/crawling_jobs/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Show crawling job
      tags:
      - Crawling Jobs
      description: Get details of a specific crawling job
      security:
      - bearerAuth: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  crawling_job:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      url:
                        type: string
                      status:
                        type: string
                      schedule:
                        type: string
                      selector:
                        type: string
                      description:
                        type: string
                      last_run_at:
                        type: string
                        format: date-time
                        nullable: true
                      next_run_at:
                        type: string
                        format: date-time
                        nullable: true
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '404':
          description: not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    put:
      summary: Update crawling job
      tags:
      - Crawling Jobs
      description: Update an existing crawling job
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  crawling_job:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      url:
                        type: string
                      status:
                        type: string
                      schedule:
                        type: string
                      selector:
                        type: string
                      description:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                  format: uri
                schedule:
                  type: string
                selector:
                  type: string
                description:
                  type: string
    delete:
      summary: Delete crawling job
      tags:
      - Crawling Jobs
      description: Delete a crawling job
      security:
      - bearerAuth: []
      responses:
        '204':
          description: no content
        '404':
          description: not found
  "/api/v1/crawling_jobs/{id}/start":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Start crawling job
      tags:
      - Crawling Jobs
      description: Start or resume a crawling job
      security:
      - bearerAuth: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Job started successfully
                  crawling_job:
                    type: object
                    properties:
                      id:
                        type: integer
                      status:
                        type: string
                        example: running
  "/api/v1/crawling_jobs/{id}/pause":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Pause crawling job
      tags:
      - Crawling Jobs
      description: Pause a running crawling job
      security:
      - bearerAuth: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Job paused successfully
                  crawling_job:
                    type: object
                    properties:
                      id:
                        type: integer
                      status:
                        type: string
                        example: paused
  "/api/v1/crawling_jobs/{id}/stop":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Stop crawling job
      tags:
      - Crawling Jobs
      description: Stop a running crawling job
      security:
      - bearerAuth: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Job stopped successfully
                  crawling_job:
                    type: object
                    properties:
                      id:
                        type: integer
                      status:
                        type: string
                        example: stopped
  "/api/v1/data":
    get:
      summary: List crawled data
      tags:
      - Crawled Data
      description: Get list of all crawled data
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
      - name: crawling_job_id
        in: query
        required: false
        description: Filter by crawling job
        schema:
          type: integer
      - name: search
        in: query
        required: false
        description: Search in content
        schema:
          type: string
      - name: date_from
        in: query
        format: date
        required: false
        description: Filter from date
        schema:
          type: string
      - name: date_to
        in: query
        format: date
        required: false
        description: Filter to date
        schema:
          type: string
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        url:
                          type: string
                          example: https://example.com/article-1
                        title:
                          type: string
                          example: Sample Article Title
                        content:
                          type: string
                          example: Article content here...
                        metadata:
                          type: object
                          properties:
                            author:
                              type: string
                              example: John Doe
                            publish_date:
                              type: string
                              format: date-time
                            tags:
                              type: array
                              items:
                                type: string
                        crawling_job_id:
                          type: integer
                          example: 1
                        crawled_at:
                          type: string
                          format: date-time
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  pagination:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                      per_page:
                        type: integer
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/data/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Show crawled data
      tags:
      - Crawled Data
      description: Get details of specific crawled data
      security:
      - bearerAuth: []
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      url:
                        type: string
                      title:
                        type: string
                      content:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: true
                      crawling_job:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          url:
                            type: string
                      crawled_at:
                        type: string
                        format: date-time
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '404':
          description: not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    delete:
      summary: Delete crawled data
      tags:
      - Crawled Data
      description: Delete specific crawled data entry
      security:
      - bearerAuth: []
      responses:
        '204':
          description: no content
        '404':
          description: not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/health":
    get:
      summary: Health check
      tags:
      - System
      description: Check API health status
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: 1.0.0
                required:
                - status
                - timestamp
                - version
servers:
- url: http://localhost:3001
  description: Development server
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: api.dcbe.com
  description: Production server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- bearerAuth: []
